name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_DIR: build

jobs:
  # Fast job: libraries and unit tests only (no Qt apps)
  build-and-test:
    name: Build & Test (libraries)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ninja-build \
            cmake

      - name: Configure
        run: |
          cmake -B ${{ env.BUILD_DIR }} -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_VERBOSE_OUTPUT=OFF \
            -DBUILD_APPS=OFF \
            -DBUILD_QT_UI=OFF \
            -DBUILD_BOOST_3RD=OFF \
            -DBUILD_DESIGN=OFF \
            -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build ${{ env.BUILD_DIR }} --parallel

      - name: Run tests
        run: ctest --test-dir ${{ env.BUILD_DIR }} --output-on-failure --parallel

  # Full job: Qt apps and design patterns
  build-full:
    name: Build (full)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ninja-build \
            cmake \
            qt6-base-dev \
            qt6-tools-dev \
            libgl1-mesa-dev \
            libboost-dev

      - name: Configure
        run: |
          cmake -B ${{ env.BUILD_DIR }} -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_VERBOSE_OUTPUT=OFF \
            -DBUILD_APPS=ON \
            -DBUILD_QT_UI=ON \
            -DBUILD_BOOST_3RD=ON \
            -DBUILD_DESIGN=ON \
            -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build ${{ env.BUILD_DIR }} --parallel

      - name: Verify executables
        run: |
          test -x "${{ env.BUILD_DIR }}/bin/BowlingConsole"
          test -x "${{ env.BUILD_DIR }}/bin/BowlingDisplay"
          test -x "${{ env.BUILD_DIR }}/bin/csvParser"
